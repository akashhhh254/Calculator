<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page Title -->
    <title>Simple Calculator</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Header -->
    <header>
        <h1>Simple Calculator</h1>
    </header>

    <!-- Calculator -->
    <section class="calc">

        <!-- Calculator Screen -->
        <input type="text" class="screen" readonly>

        <!-- Calculator Buttons -->
        <div class="keyboard">

            <button class="box">AC</button>
            <button class="box">DEL</button>
            <button class="box">%</button>
            <button class="box">/</button>

            <button class="box">7</button>
            <button class="box">8</button>
            <button class="box">9</button>
            <button class="box">*</button>

            <button class="box">4</button>
            <button class="box">5</button>
            <button class="box">6</button>
            <button class="box">-</button>

            <button class="box">1</button>
            <button class="box">2</button>
            <button class="box">3</button>
            <button class="box">+</button>

            <button class="box">PI</button>
            <button class="box">0</button>
            <button class="box">.</button>
            <button class="box">=</button>

        </div>

    </section>

    <!-- External JavaScript -->
    <script src="index.js"></script>

</body>

</html>
